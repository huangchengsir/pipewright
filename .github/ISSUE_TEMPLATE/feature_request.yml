name: ✨ 功能建议 / Feature request
description: 提议一个新功能或改进 / Suggest a new feature or improvement
labels: ["enhancement", "triage"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: 提交前确认 / Pre-flight
      options:
        - label: 我已搜索过现有 Issue,没有重复 / I searched existing issues and found no duplicate
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决什么问题 / What problem does this solve?
      description: 从用户视角描述痛点,而非直接给方案 / Describe the pain point, not just the solution
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 设想的方案 / Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案 / Alternatives considered
  - type: checkboxes
    id: constraints
    attributes:
      label: 设计约束确认 / Design constraints
      options:
        - label: 该建议不会让 CI/CD 关键路径强依赖 AI / This does not make the CI/CD critical path depend on AI
          required: true
  - type: textarea
    id: context
    attributes:
      label: 补充信息 / Additional context
