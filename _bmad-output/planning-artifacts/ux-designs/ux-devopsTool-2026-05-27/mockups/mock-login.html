<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>devopsTool · 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:oklch(14% 0.004 270);--card:oklch(20% 0.005 272);--inset:oklch(17% 0.004 270);--border:oklch(100% 0 0 / .07);--border-strong:oklch(100% 0 0 / .13);--text:oklch(95% 0.004 270);--dim:oklch(72% 0.008 270);--faint:oklch(55% 0.01 272);--primary:oklch(66% 0.155 258);--primary-press:oklch(60% 0.155 258);--primary-soft:oklch(66% 0.155 258 / .25);--cyan:oklch(82% 0.1 205);--green:oklch(77% 0.15 150);--shadow:0 1px 2px oklch(0% 0 0/.4),0 30px 70px oklch(0% 0 0/.5);}
[data-theme="light"]{--bg:oklch(97% 0.004 270);--card:oklch(100% 0 0);--inset:oklch(97.5% 0.004 270);--border:oklch(20% 0.02 270 / .1);--border-strong:oklch(20% 0.02 270 / .18);--text:oklch(25% 0.01 270);--dim:oklch(45% 0.014 270);--faint:oklch(58% 0.016 270);--primary:oklch(55% 0.17 258);--primary-press:oklch(49% 0.17 258);--primary-soft:oklch(55% 0.17 258 / .15);--cyan:oklch(52% 0.11 215);--green:oklch(56% 0.14 150);--shadow:0 1px 2px oklch(50% 0.02 270/.06),0 30px 70px oklch(50% 0.05 270/.15);}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:"Inter",ui-sans-serif,system-ui,"PingFang SC",sans-serif;color:var(--text);background:var(--bg);
  background-image:radial-gradient(800px 500px at 30% 0%,oklch(66% 0.155 258 / .12),transparent 60%),radial-gradient(700px 500px at 100% 100%,oklch(82% 0.1 205 / .08),transparent 55%);
  display:grid;place-items:center;-webkit-font-smoothing:antialiased}
.mono{font-family:"JetBrains Mono",monospace}
.box{width:380px;background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:34px 32px;animation:in .6s cubic-bezier(.16,1,.3,1) both}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:24px}
.brand .lg{width:38px;height:38px;border-radius:11px;background:var(--primary);color:#fff;display:grid;place-items:center;font-family:"JetBrains Mono";font-weight:700;font-size:1.1rem;box-shadow:0 6px 20px var(--primary-soft)}
.brand .nm{font-size:1.15rem;font-weight:700;letter-spacing:-.01em}.brand .nm small{display:block;font-size:.72rem;color:var(--faint);font-weight:400}
.lbl{font-size:.78rem;color:var(--dim);margin:16px 0 7px;font-weight:500}
.inp{width:100%;height:42px;background:var(--inset);border:1px solid var(--border-strong);border-radius:10px;padding:0 13px;color:var(--text);font:inherit;font-size:.9rem;transition:.16s}
.inp::placeholder{color:var(--faint)}.inp:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.go{width:100%;height:44px;margin-top:22px;border:none;background:var(--primary);color:#fff;font-weight:600;font-size:.92rem;border-radius:11px;cursor:pointer;box-shadow:0 8px 22px var(--primary-soft);transition:.16s}.go:hover{background:var(--primary-press);transform:translateY(-1px)}
.foot{margin-top:18px;display:flex;align-items:center;gap:7px;font-size:.74rem;color:var(--faint);justify-content:center}.foot .d{width:6px;height:6px;border-radius:50%;background:var(--green)}
.toggle{position:fixed;right:20px;bottom:18px;font-size:.74rem;color:var(--dim);border:1px solid var(--border);background:var(--card);border-radius:9px;padding:8px 13px;cursor:pointer}
@keyframes in{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
</style>
</head>
<body>
  <div class="box">
    <div class="brand"><div class="lg">d&gt;</div><div class="nm">devopsTool<small>自托管 · 单管理员</small></div></div>
    <div class="lbl">账号</div>
    <input class="inp" value="admin" />
    <div class="lbl">密码</div>
    <input class="inp" type="password" placeholder="••••••••" />
    <button class="go">登录</button>
    <div class="foot"><span class="d"></span>本实例运行于 10.0.1.21 · v0.1 · Go 单二进制</div>
  </div>
  <button class="toggle" onclick="document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'">◐ 明 / 暗</button>
</body>
</html>
