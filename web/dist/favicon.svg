<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Pipewright">
  <defs>
    <linearGradient id="pw-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5d8bff"/>
      <stop offset="1" stop-color="#3b66f0"/>
    </linearGradient>
    <linearGradient id="pw-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Brand squircle tile (electric blue) -->
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#pw-tile)"/>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#pw-sheen)"/>
  <!-- Pipeline mark: source node → flowing chevron (pipe + flow / "wright") -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- source node -->
    <circle cx="21" cy="32" r="1.5" fill="#ffffff" stroke="none"/>
    <circle cx="21" cy="32" r="5.5"/>
    <!-- flow chevron (run / deploy direction) -->
    <path d="M32 20 L46 32 L32 44"/>
  </g>
</svg>
